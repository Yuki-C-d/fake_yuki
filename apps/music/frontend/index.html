<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 music-vault</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --accent-bar: #3fb950;
            --danger: #f85149;
            --radius: 10px;
            --sidebar-w: 220px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            padding: 16px 0;
        }

        .sidebar-header {
            padding: 8px 16px 20px;
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .sidebar-header p {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .playlist-list {
            flex: 1;
            list-style: none;
            padding: 0 8px;
        }

        .playlist-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.12s;
            margin-bottom: 1px;
            user-select: none;
        }

        .playlist-list li:hover {
            background: #1c2129;
        }

        .playlist-list li.active {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent);
        }

        .playlist-list li .pl-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        .playlist-list li .pl-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-list li .pl-count {
            font-size: 11px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }

        .btn-new-playlist {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px dashed var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-new-playlist:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(88, 166, 255, 0.05);
        }

        .sidebar-toggle {
            display: none;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            min-width: 0;
            padding: 32px 24px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── Mobile playlist selector ── */
        .mobile-playlist-select {
            display: none;
            margin-bottom: 16px;
        }

        .mobile-playlist-select select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        /* ── Search ── */
        .search-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .search-wrap input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-wrap input::placeholder {
            color: var(--text-dim);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
        }

        /* ── Upload ── */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.05);
            color: var(--accent);
        }

        .upload-progress {
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .upload-progress.success {
            border-color: var(--accent-bar);
            color: var(--accent-bar);
        }

        .upload-progress.error {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ── Player ── */
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .now-playing {
            text-align: center;
            margin-bottom: 12px;
        }

        .now-playing .title {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .artist {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .now-playing .none {
            color: var(--text-dim);
            font-size: 14px;
        }

        audio {
            width: 100%;
            height: 36px;
            border-radius: 8px;
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 14px;
        }

        .ctrl-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .ctrl-btn:hover {
            background: #21262d;
            border-color: var(--accent);
            color: var(--accent);
        }

        .ctrl-btn:active {
            transform: scale(0.93);
        }

        .ctrl-btn.play-btn {
            width: 48px;
            height: 48px;
            font-size: 20px;
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .ctrl-btn.play-btn:hover {
            background: #4090e0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .song-count {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 10px;
            text-align: center;
        }

        .kbd-hint {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 8px;
            opacity: 0.6;
        }

        .kbd-hint kbd {
            background: var(--border);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 10px;
        }

        /* ── Playlist ── */
        .playlist-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        #playlist {
            list-style: none;
        }

        #playlist li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.12s;
            margin-bottom: 2px;
            position: relative;
        }

        #playlist li:hover {
            background: #1c2129;
        }

        #playlist li.active {
            background: rgba(88, 166, 255, 0.1);
        }

        #playlist li .index {
            font-size: 13px;
            color: var(--text-dim);
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        #playlist li.active .index {
            color: var(--accent);
            font-weight: 700;
        }

        #playlist li .info {
            flex: 1;
            min-width: 0;
        }

        #playlist li .info strong {
            display: block;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #playlist li .info small {
            font-size: 12px;
            color: #d4a843;
        }

        #playlist li .duration {
            font-size: 12px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        #playlist li.empty-msg {
            color: var(--text-dim);
            cursor: default;
            font-size: 13px;
            justify-content: center;
            padding: 24px;
        }

        #playlist li.empty-msg:hover {
            background: transparent;
        }

        /* ── Context Menu ── */
        .ctx-menu {
            position: fixed;
            background: #1c2129;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 0;
            min-width: 180px;
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: none;
        }

        .ctx-menu .ctx-item {
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
            user-select: none;
        }

        .ctx-menu .ctx-item:hover {
            background: rgba(88, 166, 255, 0.12);
        }

        .ctx-menu .ctx-item .ctx-check {
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .ctx-menu .ctx-separator {
            height: 1px;
            background: var(--border);
            margin: 4px 10px;
        }

        .ctx-menu .ctx-sub {
            position: relative;
        }

        .ctx-menu .ctx-sub-menu {
            position: absolute;
            left: 100%;
            top: -4px;
            background: #1c2129;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 0;
            min-width: 160px;
            display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .ctx-menu .ctx-sub:hover .ctx-sub-menu {
            display: block;
        }

        /* ── Error toast ── */
        .error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 1000;
            animation: fadeInUp 0.25s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                display: none;
                width: 100%;
                min-width: unset;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 12px 0;
            }
            .sidebar.open {
                display: flex;
            }
            .sidebar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 10px;
                margin-bottom: 16px;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: var(--surface);
                color: var(--text);
                cursor: pointer;
                font-size: 13px;
            }
            .mobile-playlist-select {
                display: block;
            }
            .main {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════ Sidebar ═══════════════════════ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>🎵 music-vault</h2>
        <p>你的私人音乐云</p>
    </div>
    <ul class="playlist-list" id="playlistNav">
        <li class="active" data-pl-id="" data-pl-name="全部歌曲">
            <span class="pl-icon">📁</span>
            <span class="pl-name">全部歌曲</span>
            <span class="pl-count" id="allSongCount">0</span>
        </li>
    </ul>
    <div class="sidebar-footer">
        <button class="btn-new-playlist" id="btnNewPlaylist">＋ 新建歌单</button>
    </div>
</aside>

<!-- ═══════════════════════ Main ═══════════════════════ -->
<div class="main">
    <!-- Mobile toggle -->
    <button class="sidebar-toggle" id="sidebarToggle">📂 歌单列表</button>

    <!-- Search -->
    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="搜索歌曲或歌手…" autocomplete="off">
    </div>

    <!-- Upload -->
    <div class="upload-zone" id="uploadZone">
        <span id="uploadLabel">📁 拖拽音频文件到此处，或点击选择文件</span>
        <input type="file" id="fileInput" accept=".m4a,.flac,.mp3,.ogg,.wav,.aac,.mp4,.ncm" hidden multiple>
    </div>
    <div class="upload-progress" id="uploadProgress" style="display:none"></div>

    <!-- Player -->
    <div class="player-card">
        <div class="now-playing" id="nowPlaying">
            <span class="none">选择一首歌开始播放</span>
        </div>
        <audio id="player" controls preload="auto"></audio>

        <div class="controls">
            <button class="ctrl-btn" id="btnPrev" title="上一首 (←)">⏮</button>
            <button class="ctrl-btn play-btn" id="btnPlay" title="播放/暂停 (空格)">▶</button>
            <button class="ctrl-btn" id="btnNext" title="下一首 (→)">⏭</button>
        </div>

        <div class="song-count" id="songCount"></div>
        <div class="kbd-hint">
            <kbd>←</kbd> 上一首 &nbsp; <kbd>→</kbd> 下一首 &nbsp; <kbd>空格</kbd> 播放/暂停
        </div>
    </div>

    <!-- Song list -->
    <div class="playlist-header" id="playlistHeader">歌曲列表</div>
    <ul id="playlist"></ul>

    <!-- Conversion queue -->
    <div class="playlist-header" id="convertHeader" style="display:none; margin-top: 24px;">🔄 转码中</div>
    <ul id="convertList"></ul>
</div>

<!-- ═══════════════════════ Context Menu ═══════════════════════ -->
<div class="ctx-menu" id="ctxMenu">
    <!-- Song context menu -->
    <div id="ctxMenuSong">
        <div class="ctx-item" id="ctxRemoveFromCurrent" style="display:none;">
            <span>🗑️ 从当前歌单移除</span>
        </div>
        <div class="ctx-item ctx-sub" id="ctxAddToPlaylist">
            <span>➕ 添加到歌单</span>
            <span style="margin-left:auto;font-size:10px;">▶</span>
            <div class="ctx-sub-menu" id="ctxPlaylistChoices"></div>
        </div>
    </div>
    <!-- Playlist sidebar context menu -->
    <div id="ctxMenuPlaylist" style="display:none;">
        <div class="ctx-item" id="ctxRenamePlaylist">✏️ 重命名</div>
        <div class="ctx-item" id="ctxDeletePlaylist" style="color:var(--danger);">🗑️ 删除</div>
    </div>
</div>

<script>
// ============================================================
//  State
// ============================================================
let songs = [];                // all songs from /api/songs
let playlists = [];            // all user playlists from /api/playlists
let playlistSongIds = new Map(); // playlist_id → Set of song_ids
let currentPlaylistId = null;  // null = "全部歌曲"
let currentSongId = null;

const playlistEl = document.getElementById('playlist');
const player = document.getElementById('player');
const searchInput = document.getElementById('search');
const nowPlaying = document.getElementById('nowPlaying');
const songCount = document.getElementById('songCount');
const playlistHeader = document.getElementById('playlistHeader');
const btnPlay = document.getElementById('btnPlay');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const playlistNav = document.getElementById('playlistNav');
const allSongCount = document.getElementById('allSongCount');
const ctxMenu = document.getElementById('ctxMenu');
const ctxMenuSong = document.getElementById('ctxMenuSong');
const ctxMenuPlaylist = document.getElementById('ctxMenuPlaylist');
const ctxPlaylistChoices = document.getElementById('ctxPlaylistChoices');

// Context menu targets
let ctxTargetSongId = null;
let ctxTargetPlaylistId = null;

// ============================================================
//  Helpers
// ============================================================
function formatDuration(sec) {
    if (!sec || sec <= 0) return '';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function showToast(msg) {
    const el = document.createElement('div');
    el.className = 'error-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

// ============================================================
//  Playlist data
// ============================================================
async function loadPlaylists() {
    try {
        const res = await fetch('/api/playlists');
        if (!res.ok) throw new Error(`服务器返回 ${res.status}`);
        playlists = await res.json();
        // Load song counts for each playlist
        for (const pl of playlists) {
            const sr = await fetch(`/api/playlists/${pl.id}/songs`);
            if (!sr.ok) {
                pl.song_count = 0;
                playlistSongIds.set(pl.id, new Set());
                continue;
            }
            const plSongs = await sr.json();
            pl.song_count = plSongs.length;
            playlistSongIds.set(pl.id, new Set(plSongs.map(s => s.id)));
        }
    } catch (err) {
        console.error('loadPlaylists failed:', err);
        showToast('⚠️ 加载歌单失败: ' + err.message);
    }
}

async function refreshPlaylists() {
    playlistSongIds.clear();
    await loadPlaylists();
    renderPlaylistNav();
    updateActivePlaylistUI();
}

function renderPlaylistNav() {
    // Clear existing user playlist items (keep "全部歌曲")
    const existingItems = playlistNav.querySelectorAll('li[data-pl-id]');
    existingItems.forEach(li => {
        if (li.dataset.plId !== '') li.remove();
    });

    // Set "全部歌曲" count
    allSongCount.textContent = songs.length;

    // Add user playlists
    playlists.forEach(pl => {
        const li = document.createElement('li');
        li.dataset.plId = pl.id;
        li.dataset.plName = pl.name;
        if (String(pl.id) === String(currentPlaylistId)) {
            li.classList.add('active');
        }
        li.innerHTML = `
            <span class="pl-icon">📋</span>
            <span class="pl-name">${escapeHtml(pl.name)}</span>
            <span class="pl-count">${pl.song_count || 0}</span>
        `;
        li.addEventListener('click', () => selectPlaylist(pl.id));
        li.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            ctxTargetPlaylistId = pl.id;
            showPlaylistContextMenu(e.clientX, e.clientY);
        });
        playlistNav.appendChild(li);
    });
}

function updateActivePlaylistUI() {
    // Update active state in nav
    playlistNav.querySelectorAll('li[data-pl-id]').forEach(li => {
        if (String(li.dataset.plId) === String(currentPlaylistId)) {
            li.classList.add('active');
        } else {
            li.classList.remove('active');
        }
    });
    // Update header
    const pl = getCurrentPlaylist();
    const filtered = getFilteredSongs();
    playlistHeader.textContent = `${pl.name} (${filtered.length})`;
}

function getCurrentPlaylist() {
    if (currentPlaylistId === null) {
        return { id: null, name: '全部歌曲' };
    }
    return playlists.find(p => String(p.id) === String(currentPlaylistId)) || { id: currentPlaylistId, name: '歌单' };
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ============================================================
//  Playlist selection
// ============================================================
async function selectPlaylist(plId) {
    currentPlaylistId = plId;
    updateActivePlaylistUI();

    if (plId === null) {
        // "全部歌曲": already loaded from /api/songs
    } else {
        // Load this playlist's songs if not cached
        if (!playlistSongIds.has(plId)) {
            try {
                const res = await fetch(`/api/playlists/${plId}/songs`);
                if (!res.ok) throw new Error(`服务器返回 ${res.status}`);
                const plSongs = await res.json();
                playlistSongIds.set(plId, new Set(plSongs.map(s => s.id)));
                // Update count in nav
                const navLi = playlistNav.querySelector(`li[data-pl-id="${plId}"]`);
                if (navLi) {
                    const countSpan = navLi.querySelector('.pl-count');
                    if (countSpan) countSpan.textContent = plSongs.length;
                }
            } catch (err) {
                console.error('selectPlaylist load failed:', err);
                playlistSongIds.set(plId, new Set());
                showToast('⚠️ 加载歌单歌曲失败: ' + err.message);
            }
        }
    }

    renderPlaylist();
}

// ============================================================
//  Search / Filter
// ============================================================
function getFilteredSongs() {
    const q = searchInput.value.trim().toLowerCase();
    // Filter by current playlist
    let pool = songs;
    if (currentPlaylistId !== null) {
        const ids = playlistSongIds.get(currentPlaylistId) || new Set();
        pool = songs.filter(s => ids.has(s.id));
    }
    // Then text search
    if (!q) return pool;
    return pool.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.artist.toLowerCase().includes(q) ||
        (s.album && s.album.toLowerCase().includes(q))
    );
}

// ============================================================
//  Play
// ============================================================
function getPlayQueue() {
    // Returns the *displayed* (filtered) song list as the play queue
    return getFilteredSongs();
}

function playSongById(songId) {
    const queue = getPlayQueue();
    const idx = queue.findIndex(s => s.id === songId);
    if (idx === -1) {
        // Song not in current view — try to find it in songs and play anyway
        const globalIdx = songs.findIndex(s => s.id === songId);
        if (globalIdx === -1) return;
        currentSongId = songId;
        player.src = `/api/stream/${songId}`;
        player.play().catch(() => {});
        updateNowPlaying();
        renderPlaylist();
        updatePlayPauseBtn();
        return;
    }
    currentSongId = songId;
    player.src = `/api/stream/${songId}`;
    player.play().catch(() => {});
    updateNowPlaying();
    renderPlaylist();
    updatePlayPauseBtn();
}

function playIndex(index) {
    const queue = getPlayQueue();
    if (queue.length === 0) return;
    const target = queue[((index % queue.length) + queue.length) % queue.length];
    playSongById(target.id);
}

function prev() {
    const queue = getPlayQueue();
    if (queue.length === 0) return;
    const curIdx = queue.findIndex(s => s.id === currentSongId);
    const prevIdx = curIdx > 0 ? curIdx - 1 : queue.length - 1;
    playSongById(queue[prevIdx].id);
}

function next() {
    const queue = getPlayQueue();
    if (queue.length === 0) return;
    const curIdx = queue.findIndex(s => s.id === currentSongId);
    const nextIdx = curIdx < queue.length - 1 ? curIdx + 1 : 0;
    playSongById(queue[nextIdx].id);
}

function togglePlay() {
    if (player.paused) {
        if (!player.src && songs.length > 0) {
            const queue = getPlayQueue();
            if (queue.length > 0) playSongById(queue[0].id);
            else playSongById(songs[0].id);
        } else {
            player.play().catch(() => {});
        }
    } else {
        player.pause();
    }
}

function updatePlayPauseBtn() {
    btnPlay.textContent = player.paused ? '▶' : '⏸';
}

// ============================================================
//  Now Playing display
// ============================================================
function updateNowPlaying() {
    const s = songs.find(x => x.id === currentSongId);
    if (!s) {
        nowPlaying.innerHTML = '<span class="none">选择一首歌开始播放</span>';
    } else {
        nowPlaying.innerHTML = `
            <div class="title" title="${escapeHtml(s.title)}">${escapeHtml(s.title)}</div>
            <div class="artist">${escapeHtml(s.artist || '未知艺人')}</div>
        `;
    }
}

// ============================================================
//  Render
// ============================================================
function renderPlaylist() {
    const filtered = getFilteredSongs();
    const pl = getCurrentPlaylist();
    playlistHeader.textContent = `${pl.name} (${filtered.length})`;
    songCount.textContent = songs.length ? `共 ${songs.length} 首` : '';

    if (filtered.length === 0) {
        playlistEl.innerHTML = '<li class="empty-msg">🔍 没有匹配的歌曲</li>';
    } else {
        playlistEl.innerHTML = filtered.map((song, i) => {
            const isActive = song.id === currentSongId;
            const dur = formatDuration(song.duration);
            return `
                <li class="${isActive ? 'active' : ''}" data-song-id="${song.id}">
                    <span class="index">${isActive ? '▶' : i + 1}</span>
                    <span class="info">
                        <strong>${escapeHtml(song.title)}</strong>
                        <small>${escapeHtml(song.artist || '')}</small>
                    </span>
                    ${dur ? `<span class="duration">${dur}</span>` : ''}
                </li>
            `;
        }).join('');
    }

    // Click events
    playlistEl.querySelectorAll('li[data-song-id]').forEach(li => {
        li.addEventListener('click', () => {
            const id = parseInt(li.dataset.songId);
            playSongById(id);
        });
        li.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            ctxTargetSongId = parseInt(li.dataset.songId);
            showSongContextMenu(e.clientX, e.clientY);
        });
    });
}

async function renderPlaylistSongList() {
    // Re-render both nav and main playlist
    renderPlaylistNav();
    renderPlaylist();
}

// ============================================================
//  Context Menu — Song
// ============================================================
function showSongContextMenu(x, y) {
    // Show/hide "remove from current playlist" option
    const removeBtn = document.getElementById('ctxRemoveFromCurrent');
    if (currentPlaylistId !== null && playlistSongIds.has(currentPlaylistId)) {
        const inCurrent = playlistSongIds.get(currentPlaylistId).has(ctxTargetSongId);
        removeBtn.style.display = inCurrent ? '' : 'none';
    } else {
        removeBtn.style.display = 'none';
    }

    // Build playlist choices
    ctxPlaylistChoices.innerHTML = '';
    if (playlists.length === 0) {
        ctxPlaylistChoices.innerHTML = '<div class="ctx-item" style="color:var(--text-dim);cursor:default;">暂无歌单</div>';
    } else {
        playlists.forEach(pl => {
            const ids = playlistSongIds.get(pl.id) || new Set();
            const inList = ids.has(ctxTargetSongId);
            const item = document.createElement('div');
            item.className = 'ctx-item';
            item.innerHTML = `
                <span class="ctx-check">${inList ? '✓' : ''}</span>
                <span>${escapeHtml(pl.name)}</span>
            `;
            item.addEventListener('click', async () => {
                const pid = Number(pl.id);
                const sid = Number(ctxTargetSongId);
                hideContextMenu();
                if (inList) {
                    try {
                        const res = await fetch(`/api/playlists/${pid}/songs/${sid}`, { method: 'DELETE' });
                        if (!res.ok) throw new Error(`服务器返回 ${res.status}`);
                        if (playlistSongIds.has(pid)) {
                            playlistSongIds.get(pid).delete(sid);
                        }
                        // Update count
                        const navLi = playlistNav.querySelector(`li[data-pl-id="${pid}"]`);
                        if (navLi) {
                            const cs = navLi.querySelector('.pl-count');
                            if (cs) cs.textContent = Math.max(0, (pl.song_count || 1) - 1);
                            pl.song_count = Math.max(0, (pl.song_count || 1) - 1);
                        }
                    } catch (err) {
                        console.error('Remove song failed:', err);
                        showToast('❌ 移除失败: ' + err.message);
                    }
                } else {
                    try {
                        const res = await fetch(`/api/playlists/${pid}/songs`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ song_id: sid }),
                        });
                        if (!res.ok) {
                            const errData = await res.json().catch(() => ({}));
                            throw new Error(errData.detail || `服务器返回 ${res.status}`);
                        }
                        if (!playlistSongIds.has(pid)) {
                            playlistSongIds.set(pid, new Set());
                        }
                        playlistSongIds.get(pid).add(sid);
                        const navLi = playlistNav.querySelector(`li[data-pl-id="${pid}"]`);
                        if (navLi) {
                            const cs = navLi.querySelector('.pl-count');
                            if (cs) cs.textContent = (pl.song_count || 0) + 1;
                            pl.song_count = (pl.song_count || 0) + 1;
                        }
                    } catch (err) {
                        console.error('Add song failed:', err);
                        showToast('❌ 添加失败: ' + err.message);
                    }
                }
                // If currently viewing this playlist, re-render
                if (String(currentPlaylistId) === String(pl.id)) {
                    renderPlaylist();
                }
            });
            ctxPlaylistChoices.appendChild(item);
        });
    }

    ctxMenuSong.style.display = '';
    ctxMenuPlaylist.style.display = 'none';
    ctxMenu.style.display = 'block';
    positionMenu(ctxMenu, x, y);
}

// ============================================================
//  Context Menu — Playlist
// ============================================================
function showPlaylistContextMenu(x, y) {
    ctxMenuSong.style.display = 'none';
    ctxMenuPlaylist.style.display = '';
    ctxMenu.style.display = 'block';
    positionMenu(ctxMenu, x, y);
}

function hideContextMenu() {
    ctxMenu.style.display = 'none';
    ctxTargetSongId = null;
    ctxTargetPlaylistId = null;
}

function positionMenu(menu, x, y) {
    // Keep menu within viewport
    let left = x;
    let top = y;
    const rect = menu.getBoundingClientRect();
    // Measure after making visible (temporarily)
    menu.style.left = '0';
    menu.style.top = '0';
    menu.style.visibility = 'hidden';
    menu.style.display = 'block';
    const w = menu.offsetWidth;
    const h = menu.offsetHeight;
    menu.style.visibility = '';

    if (x + w > window.innerWidth) left = x - w;
    if (y + h > window.innerHeight) top = y - h;
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
}

// ============================================================
//  Playlist CRUD from sidebar
// ============================================================
async function createPlaylist() {
    const name = prompt('请输入歌单名称：');
    if (!name || !name.trim()) return;
    try {
        const res = await fetch('/api/playlists', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name.trim() }),
        });
        if (!res.ok) throw new Error(`创建失败: ${res.status}`);
        await refreshPlaylists();
    } catch (err) {
        showToast(`❌ ${err.message}`);
    }
}

async function renamePlaylist(plId) {
    const pl = playlists.find(p => String(p.id) === String(plId));
    if (!pl) return;
    const newName = prompt('请输入新名称：', pl.name);
    if (!newName || !newName.trim() || newName.trim() === pl.name) return;
    try {
        const res = await fetch(`/api/playlists/${plId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName.trim() }),
        });
        if (!res.ok) throw new Error(`重命名失败: ${res.status}`);
        await refreshPlaylists();
    } catch (err) {
        showToast(`❌ ${err.message}`);
    }
}

async function deletePlaylist(plId) {
    const pl = playlists.find(p => String(p.id) === String(plId));
    if (!pl) return;
    if (!confirm(`确定要删除歌单「${pl.name}」吗？\n\n歌曲不会被删除，只会移除歌单本身。`)) return;
    try {
        const res = await fetch(`/api/playlists/${plId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`删除失败: ${res.status}`);
        // If currently viewing this playlist, switch to all songs
        if (String(currentPlaylistId) === String(plId)) {
            currentPlaylistId = null;
        }
        await refreshPlaylists();
        renderPlaylist();
        updateActivePlaylistUI();
    } catch (err) {
        showToast(`❌ ${err.message}`);
    }
}

// ============================================================
//  Events
// ============================================================

// Audio events
player.addEventListener('play', updatePlayPauseBtn);
player.addEventListener('pause', updatePlayPauseBtn);
player.addEventListener('ended', () => next());
player.addEventListener('error', () => {
    const codes = {1:'已中止', 2:'网络错误', 3:'解码失败', 4:'格式不支持'};
    const err = player.error;
    const msg = err ? `⚠️ 播放失败 [${codes[err.code] || err.code}]` : '⚠️ 音频加载失败';
    showToast(msg);
    const li = playlistEl.querySelector('li.active');
    if (li) li.style.color = 'var(--danger)';
});

// Buttons
btnPrev.addEventListener('click', prev);
btnNext.addEventListener('click', next);
btnPlay.addEventListener('click', togglePlay);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
        case 'ArrowLeft':  e.preventDefault(); prev(); break;
        case 'ArrowRight': e.preventDefault(); next(); break;
        case ' ':          e.preventDefault(); togglePlay(); break;
    }
});

// Search
searchInput.addEventListener('input', renderPlaylist);

// Close context menu
document.addEventListener('click', (e) => {
    if (!ctxMenu.contains(e.target)) {
        hideContextMenu();
    }
});

// Context menu actions
document.getElementById('ctxRemoveFromCurrent').addEventListener('click', async () => {
    const plId = currentPlaylistId;
    const sid = ctxTargetSongId;
    hideContextMenu();
    if (plId === null || !sid) return;
    try {
        const res = await fetch(`/api/playlists/${plId}/songs/${sid}`, { method: 'DELETE' });

});

document.getElementById('ctxRenamePlaylist').addEventListener('click', () => {

document.getElementById('ctxDeletePlaylist').addEventListener('click', () => {

document.getElementById('btnNewPlaylist').addEventListener('click', createPlaylist);

// "全部歌曲" click

if (allSongsLi) {

}

});

// ============================================================
//  Upload
// ============================================================
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const uploadProgress = document.getElementById('uploadProgress');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('drag-over');
});
uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const files = e.dataTransfer?.files;
    if (files && files.length) uploadFiles(Array.from(files));
});
fileInput.addEventListener('change', () => {
    if (fileInput.files && fileInput.files.length) {
        uploadFiles(Array.from(fileInput.files));
        fileInput.value = '';
    }
});

async function uploadFiles(files) {
    let successCount = 0;
    for (const file of files) {
        uploadProgress.style.display = 'block';
        uploadProgress.className = 'upload-progress';
        uploadProgress.textContent = `⏳ 正在上传: ${file.name} ...`;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (res.ok && data.status === 'ok') {
                uploadProgress.className = 'upload-progress success';
                uploadProgress.textContent = `✅ ${file.name} — 上传成功`;
                successCount++;
            } else if (res.ok && data.status === 'converting') {
                uploadProgress.className = 'upload-progress success';
                uploadProgress.textContent = `🔧 ${file.name} — ${data.message}`;
                setTimeout(() => { uploadProgress.style.display = 'none'; }, 10000);
            } else {
                uploadProgress.className = 'upload-progress error';
                uploadProgress.textContent = `❌ ${file.name} — ${data.message || '上传失败'}`;
            }
        } catch (err) {
            uploadProgress.className = 'upload-progress error';
            uploadProgress.textContent = `❌ ${file.name} — 网络错误: ${err.message}`;
        }
        await new Promise(r => setTimeout(r, 300));
    }

    if (successCount > 0) {
        await loadSongs();
        renderPlaylistNav();
        uploadProgress.className = 'upload-progress success';
        uploadProgress.textContent = `✅ 已导入 ${successCount} 首歌曲`;
        setTimeout(() => { uploadProgress.style.display = 'none'; }, 3000);
    }
}

// ============================================================
//  Init
// ============================================================
async function loadSongs() {
    try {
        const res = await fetch('/api/songs');
        if (!res.ok) throw new Error(`服务器返回 ${res.status}`);
        songs = await res.json();
        renderPlaylist();
        updateNowPlaying();
        renderPlaylistNav();
    } catch (err) {
        playlistEl.innerHTML = `<li class="empty-msg">⚠️ 无法加载歌单：${err.message}</li>`;
    }
}

async function init() {
    await loadSongs();
    await loadPlaylists();
    renderPlaylistNav();
    updateActivePlaylistUI();
}

init();

// ============================================================
//  Conversion status
// ============================================================
const convertList = document.getElementById('convertList');
const convertHeader = document.getElementById('convertHeader');

async function loadConversions() {
    try {
        const res = await fetch('/api/conversions');
        const items = await res.json();
        if (!items.length) {
            convertHeader.style.display = 'none';
            convertList.innerHTML = '';
            return;
        }
        convertHeader.style.display = '';
        const statusLabels = {
            queued: '⏳ 排队中',
            decoding: '🔓 解码中…',
            encoding: '🎚️ 即将完成',
            done: '✅ 已完成，刷新后入库',
        };
        convertList.innerHTML = items.map(c => `
            <li style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;margin-bottom:2px;cursor:default;color:var(--text-dim);">
                <span style="font-size:13px;width:24px;text-align:center;">🔄</span>
                <span style="flex:1;min-width:0;">
                    <strong style="font-size:14px;color:var(--text-dim);">${escapeHtml(c.title)}</strong>
                    <small style="display:block;font-size:11px;color:var(--text-dim);">
                        .flac <span style="color:#d4a843;">[${statusLabels[c.status] || c.status}]</span>
                    </small>
                </span>
                <span style="font-size:12px;color:var(--text-dim);">${(c.size / 1048576).toFixed(1)} MB</span>
            </li>
        `).join('');
        if (items.every(c => c.status === 'done')) {
            fetch('/api/scan', { method: 'POST' }).then(() => loadSongs());
        }
    } catch (err) {
        // silent
    }
}

loadConversions();
setInterval(loadConversions, 30000);
